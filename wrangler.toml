# ============================================================
#  wrangler.toml — Cloudflare Pages + Worker
#  Asset Integrity & Certification Tracking System
#
#  DEPLOY STEPS:
#  1. npm install -g wrangler
#  2. wrangler login
#  3. Set secrets (run each line separately):
#
#       wrangler pages secret put SUPABASE_URL              --project-name=asset-management
#       wrangler pages secret put SUPABASE_SERVICE_ROLE_KEY --project-name=asset-management
#       wrangler pages secret put RESEND_API_KEY            --project-name=asset-management
#       wrangler pages secret put ALERT_FROM_EMAIL          --project-name=asset-management
#       wrangler pages secret put ALERT_TO_EMAILS           --project-name=asset-management
#
#  4. Deploy:
#       wrangler pages deploy . --project-name=asset-management
#
#  SECRETS REFERENCE:
#   SUPABASE_URL              = https://xxxx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY = your-service-role-key (NOT anon key)
#   RESEND_API_KEY            = re_xxxxxxxxxxxx  (from resend.com)
#   ALERT_FROM_EMAIL          = alerts@yourdomain.com
#   ALERT_TO_EMAILS           = eng@co.com,mgr@co.com,safety@co.com
# ============================================================

name                   = "asset-management"
pages_build_output_dir = "."
compatibility_date     = "2024-09-23"
compatibility_flags    = ["nodejs_compat"]

# ── Cron Trigger — runs daily alert check at 06:00 UTC ──────
# Uncomment after deploying as a Worker (not Pages) if needed.
# For Cloudflare Pages, scheduled events are supported via
# the Functions scheduled handler in _worker.js automatically.
#
# [triggers]
# crons = ["0 6 * * *"]

# ── No [vars] here — all sensitive values are secrets ────────
# Set via: wrangler pages secret put KEY --project-name=asset-management
# Or via: Cloudflare Dashboard → Pages → Project → Settings → Environment Variables
