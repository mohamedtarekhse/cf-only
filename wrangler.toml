# ══════════════════════════════════════════════════════════════════════════════
#  wrangler.toml — Cloudflare Pages + Worker
#
#  NO RAILWAY NEEDED. The Worker handles the entire API.
#
#  DEPLOY STEPS:
#  1. npm install -g wrangler
#  2. wrangler login
#  3. Set secrets (run each line separately):
#       wrangler pages secret put SUPABASE_URL              --project-name=asset-management
#       wrangler pages secret put SUPABASE_SERVICE_ROLE_KEY --project-name=asset-management
#       wrangler pages secret put API_SECRET_KEY            --project-name=asset-management
#  4. Deploy:
#       wrangler pages deploy . --project-name=asset-management
# ══════════════════════════════════════════════════════════════════════════════

name                  = "asset-management"
pages_build_output_dir = "."
compatibility_date    = "2024-09-23"
compatibility_flags   = ["nodejs_compat"]

# No [vars] here — all sensitive values are secrets set via CLI or dashboard
